<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#08111f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#050a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050a12;stop-opacity:1" />
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glowRight" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a6cc4;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#050a12;stop-opacity:0" />
    </radialGradient>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.5" />
    </radialGradient>
    <clipPath id="canvas">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

