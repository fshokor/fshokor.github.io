  <!-- Left accent border -->
  <rect x="0" y="0" width="4" height="630" fill="#4da6ff"/>

  <!-- FATIMA -->
  <text x="48" y="180" font-family="'IBM Plex Mono', monospace" font-size="104" font-weight="500"
